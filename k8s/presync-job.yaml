apiVersion: batch/v1
kind: Job
metadata:
  name: liquibase-check

  annotations:
    prueba: "1"
    argocd.argoproj.io/hook: PreSync
    #argocd.argoproj.io/hook-delete-policy: BeforeHookCreation, HookSucceeded

spec:
  backoffLimit: 0

  template:
    spec:
      replicas: 2
      restartPolicy: Never

      volumes:
        - name: migrations
          emptyDir: {}

      initContainers:
        - name: clone-repository

          image: alpine/git:latest

          env:
            - name: DATABASE_SCHEMA_VERSION
              value: "1.0.0"

          command:
            - sh
            - -c

          args:
            - |
              set -e

              echo "Clonando repositorio..."

              git clone https://github.com/jgonzalez-s3/liquibase-migrations.git /workspace

              echo "Repositorio clonado."

              ls -R /workspace

          volumeMounts:
            - name: migrations
              mountPath: /workspace    

      containers:
        
        - name: liquibase
          image: liquibase/liquibase:5.0
        
          volumeMounts:
            - name: migrations
              mountPath: /workspace

          env:
            - name: LIQUIBASE_COMMAND_URL
              value: jdbc:postgresql://192.168.20.24:5432/liquibasedemo

            - name: LIQUIBASE_COMMAND_USERNAME
              value: postgres

            - name: LIQUIBASE_COMMAND_PASSWORD
              value: "12345"

          command:
            - sh
            - -c

          args:
            - |
                set -e

                echo "===== PRE-SYNC ====="

                cd /workspace

                echo "Contenido del repositorio:"
                ls -la
                ls -la changelog
                ls -la lib

                echo ""
                echo "=== Versión de Liquibase ==="
                liquibase --version

                echo ""
                echo "=== Validando changelog ==="
                liquibase validate

                echo ""
                echo "=== Consultando estado ==="

                STATUS=$(liquibase status --verbose)

                echo "$STATUS"

                if echo "$STATUS" | grep -q "0 changesets have not been applied"; then
                    echo ""
                    echo "===================================="
                    echo "La base de datos ya está actualizada."
                    echo "No se ejecutará Liquibase update."
                    echo "===================================="

                    sleep 60
                    exit 0
                fi

                echo ""
                echo "===================================="
                echo "Se detectaron migraciones pendientes."
                echo "Ejecutando Liquibase update..."
                echo "===================================="

                liquibase update

                echo ""
                echo "===================================="
                echo "Migraciones aplicadas correctamente."
                echo "===================================="

                sleep 60