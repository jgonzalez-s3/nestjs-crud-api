apiVersion: batch/v1
kind: Job
metadata:
  name: liquibase-check

  annotations:
    prueba: "1"
    argocd.argoproj.io/hook: PreSync
    #argocd.argoproj.io/hook-delete-policy: BeforeHookCreation, HookSucceeded

spec:
  backoffLimit: 0

  template:
    spec:
      replicas: 2
      restartPolicy: Never

      volumes:
        - name: migrations
          emptyDir: {}

      initContainers:
        - name: clone-repository

          image: alpine/git:latest

          command:
            - sh
            - -c

          args:
            - |
              set -e

              echo "Clonando repositorio..."

              git clone https://github.com/jgonzalez-s3/liquibase-migrations.git /workspace

              echo "Repositorio clonado."

              ls -R /workspace

          volumeMounts:
            - name: migrations
              mountPath: /workspace    

      containers:
        
        - name: liquibase
          image: liquibase/liquibase:5.0
        
          volumeMounts:
            - name: migrations
              mountPath: /workspace

          env:
            - name: LIQUIBASE_COMMAND_URL
              value: jdbc:postgresql://192.168.20.24:5432/liquibasedemo

            - name: LIQUIBASE_COMMAND_USERNAME
              value: postgres

            - name: LIQUIBASE_COMMAND_PASSWORD
              value: "12345"

          command:
            - sh
            - -c

          args:
            - |
                set -e

                echo "===== PRE-SYNC ====="

                cd /workspace

                echo "Contenido del repositorio"

                ls -R

                test -f liquibase.properties

                test -f changelog/db.changelog-master.json

                test -f lib/postgresql-42.7.10.jar

                echo "Archivos encontrados."

                liquibase --version

                sleep 60